name: Generar Top 5

on:
  workflow_dispatch:
    inputs:
      nom:
        description: 'Nom del release'
        required: true
      dj:
        description: 'Nom del DJ / Festival'
        required: true
      timestamps_manuals:
        description: 'Timestamps manuals JSON'
        required: false
        default: '{}'
      noms_manuals:
        description: 'Noms manuals JSON'
        required: false
        default: '{}'
      forcar_inici:
        description: 'Forcar inici JSON'
        required: false
        default: '{}'
      durades_manuals:
        description: 'Durades extra JSON'
        required: false
        default: '{}'

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout codi
        uses: actions/checkout@v4

      - name: Instal·lar dependències
        run: |
          pip install librosa numpy scipy anthropic requests google-auth google-auth-oauthlib google-api-python-client
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg curl
          which ffmpeg || echo "ffmpeg no trobat"
          which ffprobe || echo "ffprobe no trobat"
          ffprobe -version || echo "ffprobe no funciona"

      - name: Descarregar fonts
        run: |
          mkdir -p ~/fonts
          wget -q "https://github.com/google/fonts/raw/main/ofl/bebasneue/BebasNeue-Regular.ttf" -O ~/fonts/BebasNeue.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-SemiBold.ttf" -O ~/fonts/Montserrat-SemiBold.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" -O ~/fonts/Montserrat-ExtraBold.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Medium.ttf" -O ~/fonts/Montserrat-Medium.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -O ~/fonts/Montserrat-Bold.ttf
          echo "Fonts: $(ls ~/fonts/ | wc -l)"

      - name: Descarregar credencials des del Drive
        run: |
          python3 << 'PYEOF'
          import requests
          file_id = "${{ secrets.GDRIVE_FILE_ID }}"
          url = f"https://drive.google.com/uc?export=download&id={file_id}"
          r = requests.get(url)
          with open('credentials.json', 'wb') as f:
              f.write(r.content)
          print(f"Credencials: {len(r.content)} bytes")
          PYEOF

      - name: Descarregar video i comentaris des del Release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, glob, shutil, requests
          nom = "${{ github.event.inputs.nom }}"
          repo = "${{ github.repository }}"
          token = os.environ['GITHUB_TOKEN']
          headers = {"Authorization": f"token {token}"}
          input_dir = os.path.expanduser("~/input")
          os.makedirs(input_dir, exist_ok=True)
          r = requests.get(
              f"https://api.github.com/repos/{repo}/releases/tags/{nom}",
              headers=headers
          )
          if r.status_code != 200:
              raise Exception(f"Release no trobat: {nom}")
          for asset in r.json()['assets']:
              nom_fitxer = asset['name']
              asset_id = asset['id']
              if 'top5_final' in nom_fitxer:
                  continue
              print(f"Descarregant {nom_fitxer}...")
              r2 = requests.get(
                  f"https://api.github.com/repos/{repo}/releases/assets/{asset_id}",
                  headers={**headers, "Accept": "application/octet-stream"},
                  stream=True, allow_redirects=True
              )
              with open(f"{input_dir}/{nom_fitxer}", 'wb') as f:
                  for chunk in r2.iter_content(chunk_size=8192):
                      if chunk:
                          f.write(chunk)
              mida = os.path.getsize(f"{input_dir}/{nom_fitxer}")
              print(f"OK: {nom_fitxer} — {mida/1024/1024:.1f} MB")
          fitxers_mp4 = [(f, os.path.getsize(f)) for f in glob.glob(f"{input_dir}/*.mp4")]
          fitxers_mp4.sort(key=lambda x: x[1], reverse=True)
          if fitxers_mp4:
              shutil.move(fitxers_mp4[0][0], f"{input_dir}/set.mp4")
              print(f"Video llest: {fitxers_mp4[0][1]/1024/1024:.1f} MB")
          PYEOF

      - name: Generar Top 5
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          DJ: ${{ github.event.inputs.dj }}
          TIMESTAMPS_MANUALS: ${{ github.event.inputs.timestamps_manuals }}
          NOMS_MANUALS: ${{ github.event.inputs.noms_manuals }}
          FORCAR_INICI: ${{ github.event.inputs.forcar_inici }}
          DURADES_MANUALS: ${{ github.event.inputs.durades_manuals }}
        run: python3 generar.py

      - name: Pujar video final a GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          nom="${{ github.event.inputs.nom }}"
          repo="${{ github.repository }}"
          upload_url=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${repo}/releases/tags/${nom}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "Upload URL: $upload_url"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: video/mp4" \
            --data-binary @"$HOME/output/top5_final.mp4" \
            "${upload_url}?name=top5_final.mp4"
          echo "Pujat!"
