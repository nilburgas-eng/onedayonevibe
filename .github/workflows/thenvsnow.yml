      - name: Pujar video final a GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          set +e
          artista="${{ github.event.inputs.artista }}"
          nom=$(echo "$artista" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')
          repo="${{ github.repository }}"
          tag="thenvsnow_${nom}"

          # Comprovar si el release existeix
          release=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${repo}/releases/tags/${tag}")
          release_id=$(echo "$release" | python3 -c "import sys,json
try:
    print(json.load(sys.stdin)['id'])
except:
    print('')")

          if [ -z "$release_id" ]; then
            echo "Creant release nou..."
            new_release=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${repo}/releases" \
              -d "{\"tag_name\":\"${tag}\",\"name\":\"${tag}\",\"draft\":false}")
            upload_url=$(echo "$new_release" | python3 -c "import sys,json
try:
    print(json.load(sys.stdin)['upload_url'].split('{')[0])
except Exception as e:
    print('ERROR')")
          else
            echo "Release existent trobat"
            upload_url=$(echo "$release" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
            # Esborrar asset anterior si existeix
            asset_id=$(echo "$release" | python3 -c "import sys,json
assets = json.load(sys.stdin).get('assets', [])
for a in assets:
    if a['name'] == 'thenvsnow_final.mp4':
        print(a['id'])
        break")
            if [ ! -z "$asset_id" ]; then
              curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/releases/assets/${asset_id}"
              echo "Asset anterior esborrat"
            fi
          fi

          if [ "$upload_url" = "ERROR" ] || [ -z "$upload_url" ]; then
            echo "ERROR creant el release. Resposta:"
            echo "$new_release"
            exit 1
          fi

          echo "Pujant video a: $upload_url"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: video/mp4" \
            --data-binary @"$HOME/output/thenvsnow_final.mp4" \
            "${upload_url}?name=thenvsnow_final.mp4"

          echo ""
          echo "Pujat!"
