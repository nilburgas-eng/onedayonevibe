name: Generar Chart2

on:
  workflow_dispatch:
    inputs:
      tracks:
        description: 'Tracks JSON (opcional, salta scraping)'
        required: false
        default: ''
            setmana_text:
        description: 'Text de la setmana'
        required: false
        default: ''
      genere:
        description: 'Genere: electronica o hardstyle'
        required: false
        default: 'electronica'
      estil:
        description: 'Estil: energetic, melodic o vocal'
        required: false
        default: 'energetic'


jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout codi
        uses: actions/checkout@v4

      - name: Instal·lar dependencies
        run: |
          pip install yt-dlp requests google-auth google-auth-oauthlib google-api-python-client numpy scipy librosa
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg curl wget

      - name: Descarregar fonts
        run: |
          mkdir -p ~/fonts
          wget -q "https://github.com/google/fonts/raw/main/ofl/bebasneue/BebasNeue-Regular.ttf" -O ~/fonts/BebasNeue.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-SemiBold.ttf" -O ~/fonts/Montserrat-SemiBold.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" -O ~/fonts/Montserrat-ExtraBold.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Medium.ttf" -O ~/fonts/Montserrat-Medium.ttf
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -O ~/fonts/Montserrat-Bold.ttf
          echo "Fonts: $(ls ~/fonts/ | wc -l)"

      - name: Descarregar credencials des del Drive
        run: |
          python3 << 'PYEOF'
          import requests
          file_id = "${{ secrets.GDRIVE_FILE_ID }}"
          url = f"https://drive.google.com/uc?export=download&id={file_id}"
          r = requests.get(url)
          with open('credentials.json', 'wb') as f:
              f.write(r.content)
          print(f"Credencials: {len(r.content)} bytes")
          PYEOF

      - name: Descarregar cookies des del Drive
        run: |
          python3 << 'PYEOF'
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io
          creds = Credentials.from_service_account_file('credentials.json', scopes=['https://www.googleapis.com/auth/drive'])
          service = build('drive', 'v3', credentials=creds)
          results = service.files().list(q="name='cookies.txt'", fields="files(id, name)").execute()
          files = results.get('files', [])
          if not files:
              raise Exception("No s'ha trobat cookies.txt")
          file_id = files[0]['id']
          request = service.files().get_media(fileId=file_id)
          with open('cookies.txt', 'wb') as f:
              downloader = MediaIoBaseDownload(f, request)
              done = False
              while not done:
                  _, done = downloader.next_chunk()
          print("Cookies OK")
          PYEOF

      - name: Generar Chart2
        env:
          TRACKS: ${{ github.event.inputs.tracks }}
          SETMANA_TEXT: ${{ github.event.inputs.setmana_text }}
          GENERE: ${{ github.event.inputs.genere }}
          ESTIL: ${{ github.event.inputs.estil }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

        run: python3 chart2.py

      - name: Pujar video final a GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          repo = "${{ github.repository }}"
          tag = "chart2_setmanal"
          token = os.environ['GITHUB_TOKEN']
          headers = {"Authorization": f"token {token}"}

          r = requests.get(f"https://api.github.com/repos/{repo}/releases/tags/{tag}", headers=headers)
          if r.status_code == 200:
              release = r.json()
              upload_url = release['upload_url'].split('{')[0]
              print("Release existent trobat")
              for a in release.get('assets', []):
                  if a['name'] == 'chart_final.mp4':
                      requests.delete(f"https://api.github.com/repos/{repo}/releases/assets/{a['id']}", headers=headers)
                      print("Asset anterior esborrat")
          else:
              print("Creant release nou...")
              r = requests.post(f"https://api.github.com/repos/{repo}/releases", headers=headers,
                  json={"tag_name": tag, "name": tag, "draft": False})
              if r.status_code not in (200, 201):
                  print(f"ERROR creant release: {r.status_code}")
                  print(r.text)
                  exit(1)
              upload_url = r.json()['upload_url'].split('{')[0]

          video = os.path.expanduser("~/output/chart_final.mp4")
          mida = os.path.getsize(video)
          print(f"Pujant chart_final.mp4: {mida/1024/1024:.1f} MB")
          with open(video, 'rb') as f:
              r2 = requests.post(f"{upload_url}?name=chart_final.mp4",
                  headers={**headers, "Content-Type": "video/mp4"}, data=f)
          print(f"Pujat: {r2.status_code}")
          PYEOF
